name: fastcgo

on:
  push:
    branches:
      - master

jobs:
  windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify Go
        run: go version
      - name: Test
        run: |
          go test

  linux:
    name: Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify Go
        run: go version
      - name: Build
        run: |
          go test

  macOSamd64:
    name: MacOS (amd64)
    runs-on: macos-26-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify Go
        run: go version
      - name: Build
        run: |
          go test

  macOSarm64:
    name: MacOS (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify Go
        run: go version
      - name: Build
        run: |
          go test

  windowsArm64:
    name: Windows (arm64)
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify Go
        run: go version
      - name: Install llvm-mingw
        shell: pwsh
        run: |
          $version = "20260311"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$version/llvm-mingw-$version-ucrt-aarch64.zip"
          Invoke-WebRequest -Uri $url -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath C:\llvm-mingw
          $dir = (Get-ChildItem C:\llvm-mingw -Directory)[0].FullName
          echo "$dir\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Build
        env:
          CC: aarch64-w64-mingw32-clang
        run: |
          go test

  linuxArm64:
    name: Linux (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify Go
        run: go version
      - name: Build
        run: |
          go test
